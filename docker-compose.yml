services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: chatops_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  postgres:
    image: postgres:16
    container_name: chatops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatops_auth
      POSTGRES_USER: chatops_user
      POSTGRES_PASSWORD: chatops_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatops_user -d chatops_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: